databases:
  - name: collegenotes-postgres
    databaseName: collegenotes_db
    user: collegenotes_user
    region: oregon
    postgresMajorVersion: 15
    plan: free

services:
  - type: web
    name: collegenotes-backend
    env: java
    runtime: java
    plan: free
    region: oregon
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/portal-1.0.0.jar
    autoDeploy: true
    healthCheckPath: /
    
    # Environment variables
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: collegenotes-postgres
          property: connectionString
      - key: JAVA_VERSION
        value: 17
      - key: PORT
        value: 8080
      - key: OPENAI_API_KEY
        sync: false
  
    # Docker configuration
    dockerfilePath: ./Dockerfile
